<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BenaLed Admin</title>
  <style>
    :root {
      --bg: #07111f;
      --bg-2: #0d1728;
      --bg-3: #101d33;
      --card: rgba(10, 16, 29, 0.82);
      --card-border: rgba(126, 146, 179, 0.22);
      --card-highlight: rgba(255, 255, 255, 0.08);
      --panel: rgba(12, 20, 34, 0.86);
      --panel-2: rgba(16, 27, 44, 0.9);
      --line: rgba(126, 146, 179, 0.22);
      --line-strong: rgba(0, 229, 255, 0.3);
      --text: #f6f8fb;
      --muted: #9aa8bf;
      --ok: #4de3a2;
      --danger: #ff6b6b;
      --btn-border: rgba(255, 255, 255, 0.1);
      --focus: rgba(0, 229, 255, 0.4);
      --ui-font: "Segoe UI", "Inter", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: var(--ui-font);
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(0, 229, 255, 0.08), transparent 28%),
        radial-gradient(circle at 20% 80%, rgba(0, 153, 255, 0.08), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 45%, var(--bg-3) 100%);
      overflow-x: hidden;
      position: relative;
    }

    .bg-orb {
      position: fixed;
      border-radius: 999px;
      filter: blur(90px);
      pointer-events: none;
      opacity: 0.35;
      z-index: 0;
    }

    .bg-orb-1 {
      width: 220px;
      height: 220px;
      top: 70px;
      left: 8%;
      background: rgba(0, 229, 255, 0.18);
    }

    .bg-orb-2 {
      width: 260px;
      height: 260px;
      right: 10%;
      bottom: 80px;
      background: rgba(97, 66, 255, 0.16);
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 920px;
      margin: 0 auto;
      padding: 12px 18px 18px;
    }

    .topbar {
      margin-bottom: 10px;
    }

    .welcome-header {
      text-align: center;
      margin-bottom: 10px;
      padding-top: 0;
    }

    .welcome-title {
      position: relative;
      display: inline-block;
      margin: 0;
      font-family: "Arial Narrow", "Bahnschrift SemiCondensed", Arial, sans-serif;
      font-size: clamp(56px, 5vw, 78px);
      font-weight: 600;
      line-height: 0.9;
      letter-spacing: -0.9px;
      text-align: center;
      isolation: isolate;
    }

    .welcome-title span {
      position: relative;
      z-index: 3;
      color: #000;
      font-weight: 600;
    }

    .welcome-title::before {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      z-index: 1;
      color: transparent;
      pointer-events: none;
      text-shadow:
        -2px 0 0 #ff004c,
         2px 0 0 #ff7a00,
         0 -2px 0 #00e5ff,
         0 2px 0 #8a2eff,
        -2px -2px 0 #ff004c,
         2px -2px 0 #ff7a00,
        -2px 2px 0 #00e5ff,
         2px 2px 0 #8a2eff;
      animation: rainbowBorder 4s linear infinite;
    }

    .welcome-title::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      z-index: 0;
      color: transparent;
      pointer-events: none;
      opacity: 0.75;
      text-shadow:
        0 0 4px #ff004c,
        0 0 6px #ff7a00,
        0 0 8px #00e5ff,
        0 0 10px #8a2eff;
      filter: blur(1.5px);
      animation: rainbowBorder 4s linear infinite;
    }

    .card {
      position: relative;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0)),
        var(--card);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 18px;
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 var(--card-highlight);
      backdrop-filter: blur(14px);
    }

    .admin-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      max-width: 72ch;
      font-size: 0.96rem;
    }

    .admin-description {
      align-self: center;
      text-align: center;
    }

    .subtitle code {
      color: #dffcff;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 0.92em;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 2px 6px;
    }

    .notice {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid var(--btn-border);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      font-size: 0.95rem;
      display: flex;
      align-items: center;
    }

    .notice.ok {
      border-color: rgba(77, 227, 162, 0.45);
      color: var(--ok);
    }

    .notice.error {
      border-color: rgba(255, 107, 107, 0.5);
      color: var(--danger);
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 0.96fr) minmax(0, 1.04fr);
      grid-template-areas:
        "oled policies"
        "queueMode policies"
        "rotation queueCurrent";
      gap: 14px;
      align-items: start;
    }

    .admin-oled-card {
      grid-area: oled;
    }

    .admin-queue-mode-card {
      grid-area: queueMode;
    }

    .admin-rotation-card {
      grid-area: rotation;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
    }

    .admin-rotation-card h2,
    .admin-rotation-card .row,
    .admin-rotation-card .turn-timer {
      margin: 0;
    }

    .admin-rotation-card,
    .queue-current-card {
      height: 166px;
    }

    .section-card {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0)),
        linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      box-shadow:
        0 12px 28px rgba(0, 0, 0, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
    }

    .section-card h2 {
      margin: 0 0 12px;
      font-size: 1.08rem;
      letter-spacing: 0.01em;
    }

    .mode-options {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .mode-options > button {
      flex: 1 1 170px;
    }

    .mode-option-btn {
      min-height: 42px;
      border-radius: 11px;
      font-size: 0.95rem;
    }

    .mode-option-btn.is-active {
      border-color: var(--line-strong);
      background:
        linear-gradient(180deg, rgba(0, 229, 255, 0.24), rgba(0, 229, 255, 0.1)),
        rgba(0, 229, 255, 0.12);
      box-shadow:
        inset 0 0 0 1px rgba(0, 229, 255, 0.26),
        0 8px 20px rgba(0, 229, 255, 0.11);
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .row > button {
      flex: 1 1 170px;
    }

    .admin-policies-card {
      grid-area: policies;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-self: start;
      padding: 16px;
    }

    .admin-policies-card h2 {
      margin-bottom: 14px;
    }

    .policy-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .admin-policies-card .field-grid {
      gap: 14px 12px;
    }

    .admin-policies-card label {
      gap: 6px;
      font-size: 0.9rem;
    }

    .admin-policies-card input[type="number"] {
      min-height: 44px;
      border-color: rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 0;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 7px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    input[type="number"] {
      width: 100%;
      min-height: 42px;
      border-radius: 11px;
      border: 1px solid var(--btn-border);
      background: rgba(8, 12, 20, 0.8);
      color: var(--text);
      padding: 0 11px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.16s ease, box-shadow 0.16s ease;
    }

    input[type="number"]:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 2px rgba(0, 229, 255, 0.16);
    }

    button {
      min-height: 44px;
      border: 1px solid var(--btn-border);
      border-radius: 12px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02)),
        rgba(255, 255, 255, 0.04);
      color: var(--text);
      padding: 0 14px;
      font-family: var(--ui-font);
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      transition:
        transform 0.18s ease,
        border-color 0.18s ease,
        background 0.18s ease,
        box-shadow 0.18s ease;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        0 10px 24px rgba(0, 0, 0, 0.16);
    }

    button:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      background:
        linear-gradient(180deg, rgba(0, 229, 255, 0.12), rgba(255, 255, 255, 0.03)),
        rgba(255, 255, 255, 0.05);
    }

    button:disabled {
      opacity: 0.56;
      cursor: not-allowed;
      transform: none;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        0 8px 18px rgba(0, 0, 0, 0.14);
    }

    button.danger {
      border-color: rgba(255, 107, 107, 0.35);
      background:
        linear-gradient(180deg, rgba(255, 107, 107, 0.14), rgba(255, 255, 255, 0.03)),
        rgba(255, 107, 107, 0.08);
      color: #ffd4d4;
    }

    button.danger:hover {
      border-color: rgba(255, 107, 107, 0.5);
      background:
        linear-gradient(180deg, rgba(255, 107, 107, 0.26), rgba(255, 255, 255, 0.03)),
        rgba(255, 107, 107, 0.12);
    }

    .policy-form button {
      align-self: center;
      width: 100%;
      margin-top: 2px;
    }

    .turn-user {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 1.03rem;
    }

    .turn-user strong {
      color: var(--text);
    }

    .turn-timer {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.97rem;
    }

    .turn-timer strong {
      color: var(--text);
      letter-spacing: 0.03em;
      font-variant-numeric: tabular-nums;
    }

    .turn-timer.is-paused strong {
      color: #ffd39a;
    }

    .queue-list {
      margin: 0;
      padding: 10px 14px 10px 30px;
      color: var(--text);
      line-height: 1.5;
      max-height: 220px;
      overflow: auto;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: rgba(8, 13, 22, 0.74);
    }

    .queue-list li {
      padding-right: 8px;
    }

    .queue-current-card {
      grid-area: queueCurrent;
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    .queue-current-card .queue-list {
      flex: 1 1 auto;
      min-height: 0;
      max-height: none;
    }

    .meta {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.87rem;
      text-align: right;
    }

    .meta:empty {
      display: none;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
        grid-template-areas:
          "oled"
          "queueMode"
          "rotation"
          "policies"
          "queueCurrent";
      }

      .admin-rotation-card,
      .queue-current-card {
        height: auto;
      }

      .field-grid {
        grid-template-columns: 1fr;
      }

      .welcome-title {
        font-size: clamp(46px, 11vw, 70px);
      }

      .admin-panel {
        padding: 16px;
      }

      .admin-policies-card {
        padding: 14px;
      }
    }

    @media (max-width: 640px) {
      .app {
        padding: 10px 10px 16px;
      }

      .topbar,
      .welcome-header {
        margin-bottom: 8px;
      }

      .card.admin-panel {
        border-radius: 22px;
        padding: 14px;
        gap: 12px;
      }

      .section-card {
        border-radius: 16px;
        padding: 12px;
      }

      .subtitle {
        font-size: 0.92rem;
      }

      .admin-description {
        text-align: left;
      }

      .notice {
        border-radius: 12px;
        font-size: 0.92rem;
      }

      .mode-options {
        gap: 10px;
      }

      .mode-option-btn,
      button {
        min-height: 42px;
      }
    }

    @keyframes rainbowBorder {
      0% {
        filter: hue-rotate(0deg) blur(1.5px);
      }

      100% {
        filter: hue-rotate(360deg) blur(1.5px);
      }
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="app">
    <header class="topbar welcome-header">
      <h1 class="welcome-title" data-text="BenaLed Admin"><span>BenaLed Admin</span></h1>
    </header>

    <main class="card admin-panel">
      <p class="subtitle admin-description">
        Controle direto de fila e politicas do sistema. Esta area existe apenas na rota <code>/admin</code>.
      </p>
      <div id="notice" class="notice">Carregando estado atual...</div>

      <section class="grid">
        <article class="section-card admin-oled-card">
          <h2>Modo da tela OLED</h2>
          <div class="mode-options">
            <button id="expositionModeBtn" class="mode-option-btn" type="button" aria-pressed="false">Exposição</button>
            <button id="technicalModeBtn" class="mode-option-btn" type="button" aria-pressed="false">Técnico</button>
          </div>
        </article>

        <article class="section-card admin-queue-mode-card">
          <h2>Modo Fila</h2>
          <div class="row">
            <button id="queueModeBtn" type="button">Ativar modo fila</button>
            <button id="clearQueueBtn" type="button" class="danger">Limpar fila</button>
          </div>
        </article>

        <article class="section-card admin-rotation-card">
          <h2>Troca de turno</h2>
          <div class="row">
            <button id="rotationBtn" type="button">Pausar troca</button>
          </div>
          <p id="turnTimerLabel" class="turn-timer">Tempo restante: <strong id="turnTimerValue">00:00</strong></p>
        </article>

        <article class="section-card admin-policies-card">
          <h2>Politicas</h2>
          <form id="policyForm" class="policy-form">
            <div class="field-grid">
              <label for="defaultTurnSec">
                Tempo padrao do turno (s)
                <input id="defaultTurnSec" name="default_turn_sec" type="number" min="1" required />
              </label>
              <label for="minTurnSec">
                Tempo minimo (s)
                <input id="minTurnSec" name="min_turn_sec" type="number" min="1" required />
              </label>
              <label for="maxTurnSec">
                Tempo maximo (s)
                <input id="maxTurnSec" name="max_turn_sec" type="number" min="1" required />
              </label>
              <label for="maxUsers">
                Maximo de usuarios
                <input id="maxUsers" name="max_users" type="number" min="1" required />
              </label>
            </div>
            <button id="applyPoliciesBtn" type="submit">Aplicar politicas</button>
          </form>
        </article>

        <article class="section-card queue-current-card">
          <h2>Fila Atual</h2>
          <p class="turn-user">Usuario do turno atual: <strong id="currentUser">-</strong></p>
          <ul id="queueList" class="queue-list"></ul>
        </article>
      </section>

      <p id="lastSync" class="meta"></p>
    </main>
  </div>

  <script>
    (function () {
      const endpoint = "/admin";
      const pollIntervalMs = 5000;

      const noticeEl = document.getElementById("notice");
      const expositionModeBtn = document.getElementById("expositionModeBtn");
      const technicalModeBtn = document.getElementById("technicalModeBtn");
      const queueModeBtn = document.getElementById("queueModeBtn");
      const clearQueueBtn = document.getElementById("clearQueueBtn");
      const rotationBtn = document.getElementById("rotationBtn");
      const policyForm = document.getElementById("policyForm");
      const applyPoliciesBtn = document.getElementById("applyPoliciesBtn");
      const defaultTurnInput = document.getElementById("defaultTurnSec");
      const minTurnInput = document.getElementById("minTurnSec");
      const maxTurnInput = document.getElementById("maxTurnSec");
      const maxUsersInput = document.getElementById("maxUsers");
      const currentUserEl = document.getElementById("currentUser");
      const queueListEl = document.getElementById("queueList");
      const lastSyncEl = document.getElementById("lastSync");
      const turnTimerLabelEl = document.getElementById("turnTimerLabel");
      const turnTimerValueEl = document.getElementById("turnTimerValue");

      let state = null;
      let syncTimer = null;
      let countdownTickTimer = null;
      let pendingRequests = 0;

      function setBusy(isBusy) {
        pendingRequests += isBusy ? 1 : -1;
        if (pendingRequests < 0) pendingRequests = 0;
        const disabled = pendingRequests > 0;
        expositionModeBtn.disabled = disabled;
        technicalModeBtn.disabled = disabled;
        queueModeBtn.disabled = disabled;
        clearQueueBtn.disabled = disabled;
        rotationBtn.disabled = disabled;
        defaultTurnInput.disabled = disabled;
        minTurnInput.disabled = disabled;
        maxTurnInput.disabled = disabled;
        maxUsersInput.disabled = disabled;
        applyPoliciesBtn.disabled = disabled;
      }

      function setNotice(message, type) {
        noticeEl.textContent = message || "";
        noticeEl.classList.remove("ok", "error");
        if (type === "ok") noticeEl.classList.add("ok");
        if (type === "error") noticeEl.classList.add("error");
      }

      function updateQueueList(queue) {
        queueListEl.innerHTML = "";

        if (!Array.isArray(queue) || queue.length === 0) {
          const item = document.createElement("li");
          item.textContent = "Fila vazia.";
          queueListEl.appendChild(item);
          return;
        }

        queue.forEach(function (user, index) {
          const item = document.createElement("li");
          item.textContent = index === 0 ? user + " (turno atual)" : user;
          queueListEl.appendChild(item);
        });
      }

      function formatCountdown(totalSeconds) {
        if (!Number.isFinite(totalSeconds) || totalSeconds <= 0) {
          return "00:00";
        }

        const clamped = Math.max(0, Math.floor(totalSeconds));
        const minutes = Math.floor(clamped / 60);
        const seconds = clamped % 60;
        return String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
      }

      function renderTurnTimer() {
        if (!turnTimerLabelEl || !turnTimerValueEl || !state) return;

        const isPaused = state.queue_mode_enabled && state.rotation_paused;
        const hasActiveTurn = state.queue_mode_enabled && !state.rotation_paused && state.has_active_turn;

        turnTimerLabelEl.classList.toggle("is-paused", isPaused);
        turnTimerValueEl.textContent = isPaused ? "Pausado" : formatCountdown(hasActiveTurn ? state.turn_remaining_sec : 0);
      }

      function normalizeOledMode(mode) {
        return mode === "technical" ? "technical" : "exhibition";
      }

      function updateOledModeButtons(mode) {
        const isTechnical = mode === "technical";
        expositionModeBtn.classList.toggle("is-active", !isTechnical);
        technicalModeBtn.classList.toggle("is-active", isTechnical);
        expositionModeBtn.setAttribute("aria-pressed", String(!isTechnical));
        technicalModeBtn.setAttribute("aria-pressed", String(isTechnical));
      }

      function render(data) {
        const oledMode = normalizeOledMode(data.oled_mode);
        state = Object.assign({}, data, { oled_mode: oledMode });
        state.turn_remaining_sec = Math.max(0, Number(state.turn_remaining_sec || 0));
        state.has_active_turn = Boolean(state.has_active_turn);
        state.queue_count = Math.max(0, Number(state.queue_count || (Array.isArray(state.queue) ? state.queue.length : 0)));
        state.queue_mode_enabled = Boolean(state.queue_mode_enabled);
        state.rotation_paused = Boolean(state.rotation_paused);

        queueModeBtn.textContent = state.queue_mode_enabled ? "Desativar modo fila" : "Ativar modo fila";
        rotationBtn.textContent = state.rotation_paused ? "Retomar troca" : "Pausar troca";
        updateOledModeButtons(state.oled_mode);

        defaultTurnInput.value = String(state.default_turn_sec);
        minTurnInput.value = String(state.min_turn_sec);
        maxTurnInput.value = String(state.max_turn_sec);
        maxUsersInput.value = String(state.max_users);
        maxUsersInput.max = String(state.ap_max_connections || 1);

        currentUserEl.textContent = state.current_user && state.current_user.length > 0 ? state.current_user : "Nenhum";
        updateQueueList(state.queue);
        renderTurnTimer();
        lastSyncEl.textContent = "Ultima atualizacao: " + new Date().toLocaleTimeString();
      }

      function tickTurnCountdown() {
        if (!state) return;

        if (state.queue_mode_enabled &&
            !state.rotation_paused &&
            state.has_active_turn &&
            state.turn_remaining_sec > 0) {
          state.turn_remaining_sec -= 1;
        }

        renderTurnTimer();
      }

      async function postAction(action, payload) {
        const params = new URLSearchParams();
        params.set("action", action);

        if (payload && typeof payload === "object") {
          Object.keys(payload).forEach(function (key) {
            params.set(key, String(payload[key]));
          });
        }

        setBusy(true);
        try {
          const response = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: params.toString(),
            cache: "no-store",
          });

          const raw = await response.text();
          let data = null;

          try {
            data = JSON.parse(raw);
          } catch (err) {
            throw new Error("Resposta inesperada do servidor.");
          }

          if (!response.ok || !data.ok) {
            throw new Error(data.message || "Falha na operacao administrativa.");
          }

          render(data);
          return data;
        } finally {
          setBusy(false);
        }
      }

      async function refresh(showSuccessMessage) {
        try {
          await postAction("status");
          if (showSuccessMessage) {
            setNotice("Central administrativa pronta.", "ok");
          }
        } catch (err) {
          setNotice(err.message, "error");
        }
      }

      expositionModeBtn.addEventListener("click", async function () {
        if (!state || state.oled_mode === "exhibition") return;
        try {
          await postAction("set_oled_mode", { mode: "exhibition" });
          setNotice("Modo Exposição ativado na telinha OLED.", "ok");
        } catch (err) {
          setNotice(err.message, "error");
        }
      });

      technicalModeBtn.addEventListener("click", async function () {
        if (!state || state.oled_mode === "technical") return;
        try {
          await postAction("set_oled_mode", { mode: "technical" });
          setNotice("Modo Técnico ativado: tela de status imediata.", "ok");
        } catch (err) {
          setNotice(err.message, "error");
        }
      });

      queueModeBtn.addEventListener("click", async function () {
        if (!state) return;
        try {
          const enabled = !state.queue_mode_enabled;
          await postAction("set_queue_mode", { enabled: enabled ? 1 : 0 });
          setNotice(enabled ? "Modo fila ativado com troca automatica." : "Modo fila desativado.", "ok");
        } catch (err) {
          setNotice(err.message, "error");
        }
      });

      clearQueueBtn.addEventListener("click", async function () {
        const confirmed = window.confirm("Deseja limpar a fila agora?");
        if (!confirmed) return;
        try {
          await postAction("clear_queue");
          setNotice("Fila limpa com sucesso.", "ok");
        } catch (err) {
          setNotice(err.message, "error");
        }
      });

      rotationBtn.addEventListener("click", async function () {
        if (!state) return;
        try {
          const paused = !state.rotation_paused;
          await postAction("set_rotation", { paused: paused ? 1 : 0 });
          setNotice(paused ? "Troca de turno pausada." : "Troca de turno retomada.", "ok");
        } catch (err) {
          setNotice(err.message, "error");
        }
      });

      policyForm.addEventListener("submit", async function (event) {
        event.preventDefault();

        const apMaxConnections = Number((state && state.ap_max_connections) || 1);
        const requestedMaxUsers = Number(maxUsersInput.value);
        if (Number.isFinite(requestedMaxUsers) && requestedMaxUsers > apMaxConnections) {
          maxUsersInput.value = String(apMaxConnections);
          setNotice("Maximo de usuarios ajustado para o limite de conexoes do AP.", "error");
          return;
        }

        const payload = {
          default_turn_sec: defaultTurnInput.value,
          min_turn_sec: minTurnInput.value,
          max_turn_sec: maxTurnInput.value,
          max_users: maxUsersInput.value,
        };

        try {
          await postAction("apply_policies", payload);
          setNotice("Politicas aplicadas.", "ok");
        } catch (err) {
          setNotice(err.message, "error");
        }
      });

      refresh(true);
      syncTimer = window.setInterval(function () {
        refresh(false);
      }, pollIntervalMs);
      countdownTickTimer = window.setInterval(function () {
        tickTurnCountdown();
      }, 1000);

      window.addEventListener("beforeunload", function () {
        if (syncTimer !== null) {
          window.clearInterval(syncTimer);
        }
        if (countdownTickTimer !== null) {
          window.clearInterval(countdownTickTimer);
        }
      });
    })();
  </script>
</body>
</html>
